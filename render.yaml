services:
  - type: web
    name: euljiro-route-recommend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RESTORE_API_URL
        sync: false
      - key: REQUEST_API_URL
        sync: false

  - type: web
    name: euljiro-ai-request
    runtime: python
    rootDir: ai_request
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT flask_server:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
